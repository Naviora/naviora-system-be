name: Naviora BE CD Pipeline

on:
  workflow_run:
    workflows: ['Naviora BE CI Pipeline']
    types: [completed]
    branches:
      - main
      - develop

env:
  REGISTRY: docker.io
  PROD_IMAGE_NAME: hoanghuynguyen/naviora-system-be
  NON_PROD_IMAGE_NAME: hoanghuynguyen/naviora-system-be-dev

jobs:
  deploy-prod:
    name: Deploy (Production)
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.head_branch == 'main' ||
          (github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.pull_requests[0].base.ref == 'main')
        )
      }}
    runs-on: ubuntu-24.04
    steps:
      - name: SSH and deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            docker pull ${{ env.PROD_IMAGE_NAME }}:latest
            cd naviora
            docker compose up -d

  deploy-dev:
    name: Deploy (Development)
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.pull_requests[0].base.ref == 'develop'
        )
      }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo at CI head sha
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Detect entity changes
        id: detect-entity-changes
        run: |
          PREV_SHA=$(git rev-parse HEAD^ || echo "")
          if [ -z "$PREV_SHA" ]; then
            echo "entity_changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only "$PREV_SHA" HEAD || true)
          if echo "$CHANGED" | grep -E '^src/.+\\.entity\\.ts$' >/dev/null 2>&1; then
            echo "entity_changed=true" >> $GITHUB_OUTPUT
          else
            echo "entity_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set Docker image tag
        id: set-tag
        run: |
          if [[ "${{ github.event.workflow_run.event }}" == "pull_request" ]] && \
             [[ "${{ github.event.workflow_run.pull_requests[0].base.ref }}" == "develop" ]]; then
            echo "TAG=pr-${{ github.event.workflow_run.pull_requests[0].number }}" >> $GITHUB_ENV
          else
            echo "TAG=develop" >> $GITHUB_ENV
          fi

      - name: SSH and deploy to development (with down)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            docker pull ${{ env.NON_PROD_IMAGE_NAME }}:${{ env.TAG }}
            cd naviora
            if [[ "${{ steps.detect-entity-changes.outputs.entity_changed }}" == "true" ]]; then
                docker rm -f postgres_container || true
            fi
            docker compose up -d
