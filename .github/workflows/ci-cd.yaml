name: Naviora BE CI/CD Pipeline

on:
  push:
    branches: ['**'] # Run on all branches for push
  pull_request:
    branches: ['**'] # Run on all branches for PR

env:
  NODE_VERSION: 22
  REGISTRY: docker.io
  PROD_IMAGE_NAME: hoanghuynguyen/naviora-system-be
  NON_PROD_IMAGE_NAME: hoanghuynguyen/naviora-system-be-dev

jobs:
  # Code Quality and Build Verification Job
  quality-check:
    name: Code Quality & Build Check
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history for better analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm' # Enable npm caching

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Check code formatting
        run: npm run format -- --check --ignore-path .prettierignore --ignore-pattern "test/**"

      - name: Run ESLint
        run: npm run lint -- --ignore-pattern "test/**"

      - name: Type checking
        run: |
          echo '{"extends": "./tsconfig.json", "exclude": ["test/**/*", "**/*.spec.ts", "**/*.test.ts"]}' > tsconfig.ci.json
          npx tsc --noEmit --project tsconfig.ci.json

      - name: Build application
        run: npm run build

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            dist/
            node_modules/
          key: build-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            build-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

  # Production Docker Build and Push Job (only runs on main branch)
  docker-build-prod:
    name: Docker Build & Push (Production)
    runs-on: ubuntu-24.04
    needs: quality-check
    if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for production
        id: meta-prod
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PROD_IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push production Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-prod.outputs.tags }}
          labels: ${{ steps.meta-prod.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # Non-Production Docker Build and Push Job (runs on all other branches)
  docker-build-dev:
    name: Docker Build & Push (Development)
    runs-on: ubuntu-24.04
    needs: quality-check
    if: github.ref != 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for development
        id: meta-dev
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.NON_PROD_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push development Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-dev.outputs.tags }}
          labels: ${{ steps.meta-dev.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: development
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # Production Deployment Job
  deploy-prod:
    name: Deploy (Production)
    runs-on: ubuntu-24.04
    needs: docker-build-prod
    if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main')

    steps:
      - name: SSH and deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            docker pull ${{ env.PROD_IMAGE_NAME }}:latest
            cd naviora-prod
            docker compose up -d

  # Development Deployment Job
  deploy-dev:
    name: Deploy (Development)
    runs-on: ubuntu-24.04
    needs: docker-build-dev
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'pull_request' && github.base_ref == 'develop')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect entity changes
        id: detect-entity-changes
        run: |
          PREV_SHA=$(git rev-parse HEAD^ || echo "")
          if [ -z "$PREV_SHA" ]; then
            echo "entity_changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only "$PREV_SHA" HEAD || true)
          if echo "$CHANGED" | grep -E '^src/.+\\.entity\\.ts$' >/dev/null 2>&1; then
            echo "entity_changed=true" >> $GITHUB_OUTPUT
          else
            echo "entity_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set Docker image tag
        id: set-tag
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]] && \
             [[ "${{ github.base_ref }}" == "develop" ]]; then
            echo "TAG_BE=pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          else
            echo "TAG_BE=develop" >> $GITHUB_ENV
          fi

      - name: SSH and deploy to development
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            docker pull ${{ env.NON_PROD_IMAGE_NAME }}:${{ env.TAG_BE }}
            cd be-non-prod
            if [[ "${{ steps.detect-entity-changes.outputs.entity_changed }}" == "true" ]]; then
                docker rm -f postgres_container || true
            fi
            TAG_BE=${{ env.TAG_BE }} docker compose up -d
