services:
  postgres:
    image: postgres:16
    container_name: postgres_container
    env_file:
      - .env.dev
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - '${DATABASE_PORT}:${DATABASE_PORT}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - app-network

  redis:
    image: redis:7.4.2
    container_name: redis_container
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - app-network

  naviora-app:
    container_name: naviora-app
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: npm run start:dev
    depends_on:
      - postgres
    env_file:
      - .env.dev

    ports:
      - '${APP_PORT}:${APP_PORT}' # port app
      - '${SOCKET_PORT}:${SOCKET_PORT}' # port socket
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
